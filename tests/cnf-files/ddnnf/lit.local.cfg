# -*- Python -*-
#
# Substitutions for the d-DNNF compile/cleanup/render tests in this directory.
# These pin only SEMANTIC invariants of the emitted circuit (model count, model
# set, decomposability, canonical cleaned form) -- never the byte-exact .nnf --
# so they stay green when the search heuristics reshape the circuit.

import os

obj = config.ganak_obj_root   # build dir: holds ddnnf-cleanup, ddnnf2dot
src = config.ganak_src_root
verify = config.python_executable + ' ' + os.path.join(src, 'tests', 'ddnnf_verify.py')

config.substitutions.append(('%ddnnf_verify', verify))
config.substitutions.append(('%ddnnf_cleanup', os.path.join(obj, 'ddnnf-cleanup')))
config.substitutions.append(('%ddnnf2dot', os.path.join(obj, 'ddnnf2dot')))
